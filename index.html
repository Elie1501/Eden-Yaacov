<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Eden & Yaacov | 23.06.2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rose-accent: #AD5D78;
            --rose-dark: #753E4D;
            --text-color: #4A4A4A;
            --glass: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: #fdf6f8;
            color: var(--text-color);
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
        }

        /* Background avec animation de zoom lent */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('fond3.png') center center no-repeat;
            background-size: cover;
            animation: kenBurns 20s infinite alternate ease-in-out;
            z-index: -2;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Overlay Aquarelle subtil */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(253,246,248,0.2) 0%, rgba(253,246,248,0.7) 100%);
            z-index: -1;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* Logo flottant */
        .logo-box {
            animation: float 4s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo {
            width: 180px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .title-wrap {
            margin-bottom: 40px;
        }

        .save-the-date {
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--rose-accent);
            margin-bottom: 10px;
            display: block;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: var(--rose-dark);
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            line-height: 1.2;
        }

        /* Bouton Invitation style "Couture" */
        .btn-invitation {
            position: relative;
            display: inline-block;
            padding: 18px 40px;
            background: white;
            color: var(--rose-accent);
            text-decoration: none;
            text-transform: uppercase;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            border: 1px solid var(--rose-accent);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(173, 93, 120, 0.15);
            animation: pulseBtn 3s infinite;
        }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(173, 93, 120, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(173, 93, 120, 0); }
            100% { box-shadow: 0 0 0 0 rgba(173, 93, 120, 0); }
        }

        .btn-invitation:hover {
            background: var(--rose-accent);
            color: white;
            transform: translateY(-3px);
            letter-spacing: 6px;
        }

        /* Countdown Glassmorphism */
        .countdown-wrapper {
            margin-top: 60px;
            display: flex;
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        .countdown-item {
            min-width: 65px;
            display: flex;
            flex-direction: column;
        }

        .number {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            color: var(--rose-dark);
            font-weight: 600;
        }

        .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            margin-top: 2px;
        }

        /* Particules en fond */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .names { font-size: 3.2rem; }
            .logo { width: 140px; }
            .countdown-wrapper { gap: 8px; padding: 15px; }
            .number { font-size: 1.4rem; }
            .countdown-item { min-width: 55px; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>
    <div class="overlay"></div>
    <canvas id="particles"></canvas>

    <div class="main-container">
        <div class="logo-box">
            <img src="logo4.png" alt="Logo" class="logo">
        </div>

        <div class="title-wrap">
            <span class="save-the-date">Save the Date</span>
            <h1 class="names">Eden & Yaacov</h1>
        </div>

        <a href="invitation.html" class="btn-invitation">Ouvrir l'Invitation</a>

        <div class="countdown-wrapper">
            <div class="countdown-item">
                <span class="number" id="days">00</span>
                <span class="label">Jours</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="hours">00</span>
                <span class="label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="minutes">00</span>
                <span class="label">Min</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="seconds">00</span>
                <span class="label">Sec</span>
            </div>
        </div>
    </div>

    <script>
        // --- COUNTDOWN LOGIC ---
        const targetDate = new Date("Jun 23, 2026 18:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.querySelector(".countdown-wrapper").innerHTML = "<p style='font-family:Cinzel; letter-spacing:3px;'>C'est le grand jour !</p>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // --- SUBTLE PARTICLES ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(173, 93, 120, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 50; i++) particlesArray.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
